<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALM 2.0 Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <button id="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark">
      <span id="theme-icon">🌙</span>
    </button>

    <style>
      #theme-toggle {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid var(--border, #D8DCDE);
        background: var(--bg, #fff);
        cursor: pointer;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        transition: background 0.2s, border-color 0.2s;
      }
      #theme-toggle:hover { opacity: 0.8; }
    </style>

    <script>
      const html = document.documentElement;
      const btn = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');

      function apply(theme) {
        html.dataset.theme = theme;
        icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('ds-theme', theme);
      }

      apply(localStorage.getItem('ds-theme') || html.dataset.theme || 'light');

      btn.addEventListener('click', () => {
        apply(html.dataset.theme === 'dark' ? 'light' : 'dark');
      });
    </script>
  </body>
</html>
